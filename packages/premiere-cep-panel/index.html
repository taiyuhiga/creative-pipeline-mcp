<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Creative Pipeline MCP</title>
  <style>
    body { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 16px; background: #252525; color: #f5f5f5; }
    input, button, select, textarea { width: 100%; box-sizing: border-box; margin: 6px 0; }
    textarea { height: 180px; background: #111; color: #f5f5f5; }
    select { min-height: 120px; background: #111; color: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Creative Pipeline MCP</h1>
  <label>Queue directory</label>
  <input id="queueDir" placeholder="/absolute/path/to/artifacts/premiere/cep_queue">
  <button id="refresh">Refresh Queue</button>
  <select id="commands" size="6"></select>
  <button id="runSelected">Run Selected</button>
  <button id="poll">Run All Pending</button>
  <button id="refreshStatus">Refresh Status</button>
  <select id="statuses" size="5"></select>
  <textarea id="log" readonly></textarea>
  <script src="./js/main.js"></script>
</body>
</html>
