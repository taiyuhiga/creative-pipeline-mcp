name: npm publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.2.14-alpha.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    if: vars.NPM_TRUSTED_PUBLISHING_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm test
      - run: npm run check:adapters
      - run: node examples/premiere-project-delivery.mjs
        env:
          CREATIVE_MCP_PERMISSION: project_write
      - run: npm run package:premiere-cep -- --verify
      - run: npm pack --dry-run
      - name: Verify release tag matches package version
        run: |
          node -e "const pkg=require('./package.json'); const tag=process.env.RELEASE_TAG; if (tag !== 'v' + pkg.version) throw new Error(`${tag} does not match v${pkg.version}`);"
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
      - run: npm publish --access public
