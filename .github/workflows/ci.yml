name: CI

on:
  push:
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run check:schemas
      - run: npm run check:v1-freeze

  optional-adapter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run check:adapters

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check:schemas
      - run: npm run check:v1-freeze
      - run: npm run check:adapters
      - run: npm run package:premiere-cep -- --verify

  windows-blender-e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install Blender
        shell: powershell
        run: choco install blender -y --no-progress
      - name: Resolve Blender path
        shell: powershell
        run: |
          $candidate = Get-ChildItem "C:\Program Files\Blender Foundation" -Recurse -Filter blender.exe | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $candidate) {
            throw "blender.exe was not found after Chocolatey installation"
          }
          "BLENDER_BIN=$($candidate.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "$($candidate.DirectoryName)" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          Write-Host "Resolved Blender: $($candidate.FullName)"
      - name: Verify Blender CLI
        shell: powershell
        run: '& "$env:BLENDER_BIN" --version'
      - name: Run Blender GLB E2E on Windows
        shell: powershell
        run: node examples/blender-e2e.mjs

  blender-e2e-optional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: |
          if command -v blender >/dev/null 2>&1; then
            node examples/blender-e2e.mjs
          else
            echo "Skipping Blender e2e: blender is not installed on this runner."
          fi

  premiere-qc-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: node examples/premiere-qc-e2e.mjs

  package-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm pack --dry-run
      - run: npm run check:release
      - run: npm run check:v1-freeze
      - run: npm run smoke:npm-install
      - run: npm run package:premiere-cep -- --verify
