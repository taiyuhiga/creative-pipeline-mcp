name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run check:adapters
      - run: |
          if command -v blender >/dev/null 2>&1; then
            node examples/blender-e2e.mjs
          else
            echo "Skipping Blender e2e: blender is not installed on this runner."
          fi
      - run: npm pack --dry-run
